@if (compact) {
<button
  class="lang-btn lang-btn-compact"
  [attr.aria-label]="'Change language, current: ' + currentLanguage.toUpperCase()"
  [title]="currentLanguage.toUpperCase()"
  (click)="cycleLanguage()">
  {{ currentLanguage.toUpperCase() }}
</button>
} @else {
<div class="language-switcher">
  @for (language of languages; track language) {
  <button
    class="lang-btn"
    [class.active]="currentLanguage === language"
    (click)="useLanguage(language)">
    {{ language.toUpperCase() }}
  </button>
  }
</div>
}
