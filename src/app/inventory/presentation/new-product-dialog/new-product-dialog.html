<h3 class="dlg-title">Nuevo Producto</h3>

<div class="form-grid">
  <label>Nombre</label>
  <input [(ngModel)]="form.name" placeholder="Leche Gloria"/>

  <label>Categoría</label>
  <select [(ngModel)]="form.categoryId">
    <option [ngValue]="''" disabled>Seleccionar…</option>
    <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
  </select>

  <label>Proveedor</label>
  <select [(ngModel)]="form.providerId">
    <option [ngValue]="''" disabled>Seleccionar…</option>
    <option *ngFor="let p of providers" [ngValue]="p.id">{{ p.firstName }} {{ p.lastName }}</option>
  </select>

  <label>Stock Mínimo</label>
  <input type="number" min="0" [(ngModel)]="form.minStock"/>

  <label>Precio unitario</label>
  <div class="price">
    <span>s/</span>
    <input type="number" step="0.01" [(ngModel)]="form.unitPrice"/>
  </div>
</div>

<div class="actions">
  <button class="btn ghost" (click)="cancel()">Cancelar</button>
  <button class="btn primary" [disabled]="!isValid" (click)="save()">Guardar</button>
</div>
